<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Login</title>
    <style>
        /* --- CYBER-TECH CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            width: 400px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            border: 1px solid #00d2ff;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(0, 210, 255, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            border: none;
            border-bottom: 1px solid #fff;
            outline: none;
            background: transparent;
            transition: 0.5s;
        }

        .input-group label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            pointer-events: none;
            transition: 0.5s;
        }

        /* Animation for labels when typing */
        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px;
            left: 0;
            color: #00d2ff;
            font-size: 12px;
        }

        button {
            width: 100%;
            padding: 10px 20px;
            background: transparent;
            color: #00d2ff;
            border: 1px solid #00d2ff;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.5s;
            overflow: hidden;
            position: relative;
        }

        button:hover {
            background: #00d2ff;
            color: #fff;
            box-shadow: 0 0 10px #00d2ff, 0 0 40px #00d2ff;
        }

        #error-msg {
            color: #ff4b2b;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" required>
                <label>Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label>Password</label>
            </div>
            <button type="submit">Access System</button>
            <p id="error-msg">Access Denied: Invalid Credentials</p>
        </form>
    </div>

    <script>
        // Set your desired credentials here
        const MASTER_USER = "admin";
        const MASTER_PASS = "12345";

        // Save to LocalStorage automatically so it's "persisted"
        localStorage.setItem('admin_user', MASTER_USER);
        localStorage.setItem('admin_pass', MASTER_PASS);

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;

            // Retrieve from LocalStorage to verify
            const storedUser = localStorage.getItem('admin_user');
            const storedPass = localStorage.getItem('admin_pass');

            if (userIn === storedUser && passIn === storedPass) {
                // REDIRECT TO admin.html
                window.location.href = "admin.html";
            } else {
                errorMsg.style.display = "block";
                // Shake effect or reset
                document.getElementById('password').value = "";
            }
        });
    </script>
</body>
</html>
