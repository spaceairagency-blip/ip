
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- PREMIUM NEUMORPHIC CSS --- */
        :root {
            --bg: #e0e5ec;
            --shadow: #a3b1c6;
            --light: #ffffff;
            --primary: #4b6cb7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 350px;
            padding: 40px;
            border-radius: 30px;
            background: var(--bg);
            box-shadow: 20px 20px 60px var(--shadow), 
                       -20px -20px 60px var(--light);
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
            color: #444;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-left: 15px;
            margin-bottom: 8px;
            color: #666;
            font-size: 12px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            border: none;
            outline: none;
            background: var(--bg);
            border-radius: 15px;
            box-shadow: inset 6px 6px 12px var(--shadow), 
                        inset -6px -6px 12px var(--light);
            color: #444;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: inset 2px 2px 5px var(--shadow), 
                        inset -2px -2px 5px var(--light);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 15px;
            background: var(--bg);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 6px 6px 12px var(--shadow), 
                        -6px -6px 12px var(--light);
            transition: 0.2s;
        }

        button:active {
            box-shadow: inset 4px 4px 8px var(--shadow), 
                        inset -4px -4px 8px var(--light);
            transform: scale(0.98);
        }

        #error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 15px;
            height: 15px;
            visibility: hidden;
        }

        /* Dashboard (Hidden by default) */
        .hidden { display: none !important; }
        
        .welcome-screen {
            text-align: center;
            color: #444;
        }

        .welcome-screen h1 { font-size: 24px; margin-bottom: 10px; }
        .logout-btn { color: #888; font-size: 12px; text-decoration: underline; cursor: pointer; margin-top: 20px; display: block; }
    </style>
</head>
<body>

    <div class="login-card" id="loginPanel">
        <h2>LOGIN</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="" required>
            </div>
            <button type="submit">ENTER</button>
            <p id="error-msg">Invalid Credentials</p>
        </form>
    </div>

    <div class="login-card hidden" id="dashboard">
        <div class="welcome-screen">
            <h1>Access Granted</h1>
            <p>Welcome back, <span id="userDisplay"></span>.</p>
            <span class="logout-btn" onclick="logout()">Sign Out</span>
        </div>
    </div>

    <script>
        // --- LOGIC ---
        
        // Setting a "Pre-defined" user in LocalStorage if it doesn't exist
        // This acts as your database since there is no register button.
        if (!localStorage.getItem('admin')) {
            localStorage.setItem('admin', '1234'); // Default Username: admin | Password: 1234
        }

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');
        const loginPanel = document.getElementById('loginPanel');
        const dashboard = document.getElementById('dashboard');
        const userDisplay = document.getElementById('userDisplay');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Check LocalStorage for the user
            const storedPass = localStorage.getItem(user);

            if (storedPass && storedPass === pass) {
                // Success Transition
                errorMsg.style.visibility = "hidden";
                loginPanel.classList.add('hidden');
                dashboard.classList.remove('hidden');
                userDisplay.innerText = user;
            } else {
                // Fail
                errorMsg.style.visibility = "visible";
                document.getElementById('password').value = "";
            }
        });

        function logout() {
            dashboard.classList.add('hidden');
            loginPanel.classList.remove('hidden');
            loginForm.reset();
        }
    </script>
</body>
</html>
