
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Chat - Secure Sync</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a; --border: #222222;
    --accent: #25D366; --accent2: #128C7E; --text: #e8e8e8; --muted: #666;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif; --display: 'Bebas Neue', cursive;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; overflow: hidden; }
  
  .layout { display: flex; height: 100vh; }
  
  /* SIDEBAR */
  .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .logo { padding: 24px; border-bottom: 1px solid var(--border); }
  .logo-top { font-family: var(--display); font-size: 28px; color: var(--accent); letter-spacing: 2px; }
  .user-list { flex: 1; overflow-y: auto; padding: 10px; }
  .user-item { padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 4px; }
  .user-item:hover { background: var(--surface2); }
  .user-avatar { width: 35px; height: 35px; background: var(--accent2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 18px; color: white; }
  .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }

  /* CHAT AREA */
  .main-chat { flex: 1; display: flex; flex-direction: column; background: #0c0c0c; }
  .chat-header { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; }
  .chat-header h2 { font-family: var(--display); font-size: 22px; letter-spacing: 1px; }

  .messages-container { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; position: relative; }
  .msg-incoming { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); }
  .msg-outgoing { align-self: flex-end; background: var(--accent2); color: white; }
  .msg-info { font-family: var(--mono); font-size: 9px; opacity: 0.6; margin-bottom: 4px; display: block; }

  /* INPUT AREA */
  .input-area { padding: 20px 24px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 12px; }
  input { flex: 1; background: var(--surface2); border: 1px solid var(--border); padding: 12px 16px; color: var(--text); border-radius: 8px; font-family: var(--sans); outline: none; }
  input:focus { border-color: var(--accent); }
  .send-btn { background: var(--accent); color: black; border: none; padding: 0 24px; border-radius: 8px; font-family: var(--display); font-size: 18px; cursor: pointer; transition: 0.2s; }
  .send-btn:hover { transform: scale(1.02); background: #1db954; }

  /* AUTH OVERLAY */
  #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .auth-card { background: var(--surface); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 350px; text-align: center; }
  .auth-card h1 { font-family: var(--display); font-size: 32px; margin-bottom: 20px; color: var(--accent); }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h1>ENTER CHAT</h1>
    <input type="text" id="username-input" placeholder="Your Name..." style="margin-bottom: 15px;">
    <button class="send-btn" style="width: 100%; height: 45px;" onclick="joinChat()">JOIN NOW</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-top">CLOUD CHAT</div>
    </div>
    <div class="user-list" id="active-users">
      <div class="user-item"><span class="status-dot"></span> <span style="font-family: var(--mono); font-size: 12px; color: var(--muted);">Syncing users...</span></div>
    </div>
    <div style="padding: 15px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--muted);">
      ID: <span id="my-id">---</span>
    </div>
  </aside>

  <main class="main-chat">
    <header class="chat-header">
      <h2 id="current-room">PUBLIC CHANNEL</h2>
    </header>
    
    <div class="messages-container" id="msg-box"></div>

    <div class="input-area">
      <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()">SEND</button>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDZbD3qG1dKzM9v7A2f7j9E2UZoCEmFKg0",
    authDomain: "groupadmin-62e30.firebaseapp.com",
    databaseURL: "https://groupadmin-62e30-default-rtdb.firebaseio.com",
    projectId: "groupadmin-62e30"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let currentUser = null;

  window.joinChat = () => {
    const name = document.getElementById('username-input').value.trim();
    if(!name) return alert("Enter a name");
    
    currentUser = name;
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('my-id').innerText = name.toUpperCase();

    // Register User Online
    const userRef = ref(db, 'chatSystem/users/' + name);
    set(userRef, { status: 'online', lastSeen: serverTimestamp() });
    onDisconnect(userRef).remove();

    initChatSync();
  };

  function initChatSync() {
    // Sync Messages
    onValue(ref(db, 'chatSystem/messages'), (snap) => {
      const box = document.getElementById('msg-box');
      box.innerHTML = '';
      const data = snap.val() || {};
      Object.values(data).forEach(m => {
        const isMe = m.user === currentUser;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'msg-outgoing' : 'msg-incoming'}`;
        div.innerHTML = `
          <span class="msg-info">${m.user} • ${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
          ${m.text}
        `;
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    });

    // Sync Active Users
    onValue(ref(db, 'chatSystem/users'), (snap) => {
      const list = document.getElementById('active-users');
      list.innerHTML = '';
      const users = snap.val() || {};
      Object.keys(users).forEach(u => {
        list.innerHTML += `
          <div class="user-item">
            <div class="user-avatar">${u[0]}</div>
            <div style="flex:1; font-size:13px;">${u}</div>
            <div class="status-dot"></div>
          </div>
        `;
      });
    });
  }

  window.sendMessage = () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if(!text) return;

    push(ref(db, 'chatSystem/messages'), {
      user: currentUser,
      text: text,
      time: Date.now()
    });
    input.value = '';
  };
</script>
</body>
</html>
