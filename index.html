<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cloud Chat v2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a; --border: #222222;
    --accent: #25D366; --accent2: #128C7E; --text: #e8e8e8; --muted: #666;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif; --display: 'Bebas Neue', cursive;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; overflow: hidden; position: fixed; width: 100%; }
  
  .layout { display: flex; height: 100vh; }
  
  /* SIDEBAR & MOBILE LOGIC */
  .sidebar { 
    width: 280px; background: var(--surface); border-right: 1px solid var(--border); 
    display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1000;
  }
  
  @media (max-width: 768px) {
    .sidebar { position: absolute; left: 0; height: 100%; transform: translateX(-100%); width: 80%; }
    .sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; }
    .overlay.active { display: block; }
  }

  .logo { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .logo-top { font-family: var(--display); font-size: 24px; color: var(--accent); letter-spacing: 2px; }
  .user-list { flex: 1; overflow-y: auto; padding: 10px; }
  .user-item { padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .user-avatar { width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--display); color: var(--accent); }
  .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 5px var(--accent); }

  /* MAIN CHAT */
  .main-chat { flex: 1; display: flex; flex-direction: column; background: #0c0c0c; width: 100%; }
  .chat-header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 15px; }
  .menu-btn { display: none; background: none; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; }
  @media (max-width: 768px) { .menu-btn { display: block; } }

  .messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 14px; position: relative; animation: slideIn 0.2s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .msg-incoming { align-self: flex-start; background: var(--surface2); border-bottom-left-radius: 2px; }
  .msg-outgoing { align-self: flex-end; background: var(--accent2); border-bottom-right-radius: 2px; }
  .msg-info { font-family: var(--mono); font-size: 9px; opacity: 0.6; margin-bottom: 3px; display: block; }

  /* TYPING INDICATOR */
  #typing-area { height: 20px; padding: 0 20px; font-size: 11px; color: var(--accent); font-family: var(--mono); font-style: italic; }

  /* INPUT */
  .input-area { padding: 15px; background: var(--surface); border-top: 1px solid var(--border); }
  .input-wrapper { display: flex; gap: 10px; }
  input { flex: 1; background: var(--surface2); border: 1px solid var(--border); padding: 12px 15px; color: #fff; border-radius: 10px; outline: none; font-size: 16px; }
  .send-btn { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 10px; font-family: var(--display); font-size: 18px; cursor: pointer; }

  /* AUTH */
  #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--surface); padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 100%; max-width: 350px; text-align: center; }
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <h1 style="font-family: var(--display); color: var(--accent); font-size: 40px; margin-bottom: 20px;">SYNC CHAT</h1>
    <input type="text" id="username-input" placeholder="Enter Username..." style="width:100%; margin-bottom:15px;">
    <button class="send-btn" style="width: 100%; height: 50px;" onclick="joinChat()">ACCESS SYSTEM</button>
  </div>
</div>

<div class="overlay" id="mobile-overlay" onclick="toggleMenu()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-top">TERMINAL</div>
      <button class="menu-btn" onclick="toggleMenu()">✕</button>
    </div>
    <div class="user-list" id="active-users"></div>
    <div style="padding: 15px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px;">
      STATUS: <span style="color: var(--accent)">ENCRYPTED</span>
    </div>
  </aside>

  <main class="main-chat">
    <header class="chat-header">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <h2 style="font-family: var(--display); letter-spacing: 1px;">Global Encrypted Channel</h2>
    </header>
    
    <div class="messages-container" id="msg-box"></div>
    
    <div id="typing-area"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="chat-input" placeholder="Write a message..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">SEND</button>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, set, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDZbD3qG1dKzM9v7A2f7j9E2UZoCEmFKg0",
    authDomain: "groupadmin-62e30.firebaseapp.com",
    databaseURL: "https://groupadmin-62e30-default-rtdb.firebaseio.com",
    projectId: "groupadmin-62e30"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let currentUser = null;
  let typingTimeout;

  // GLOBAL ACTIONS
  window.toggleMenu = () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('mobile-overlay').classList.toggle('active');
  };

  window.joinChat = () => {
    const name = document.getElementById('username-input').value.trim();
    if(!name) return;
    
    currentUser = name;
    document.getElementById('auth-overlay').style.display = 'none';

    // Set Online Status
    const userRef = ref(db, `chatSystem/users/${name}`);
    set(userRef, { status: 'online', isTyping: false });
    onDisconnect(userRef).remove();

    initApp();
  };

  function initApp() {
    const input = document.getElementById('chat-input');
    
    // Typing Listener
    input.addEventListener('input', () => {
      set(ref(db, `chatSystem/users/${currentUser}/isTyping`), true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        set(ref(db, `chatSystem/users/${currentUser}/isTyping`), false);
      }, 2000);
    });

    // Enter Key
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    // Sync Messages
    onValue(ref(db, 'chatSystem/messages'), (snap) => {
      const box = document.getElementById('msg-box');
      box.innerHTML = '';
      const data = snap.val() || {};
      Object.values(data).forEach(m => {
        const isMe = m.user === currentUser;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'msg-outgoing' : 'msg-incoming'}`;
        div.innerHTML = `
          <span class="msg-info">${m.user} • ${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
          ${m.text}
        `;
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    });

    // Sync Users & Typing Status
    onValue(ref(db, 'chatSystem/users'), (snap) => {
      const list = document.getElementById('active-users');
      const typingDisp = document.getElementById('typing-area');
      list.innerHTML = '';
      let typers = [];
      
      const users = snap.val() || {};
      Object.entries(users).forEach(([name, data]) => {
        list.innerHTML += `
          <div class="user-item">
            <div class="user-avatar">${name[0].toUpperCase()}</div>
            <div style="flex:1; font-size:13px; font-weight:600;">${name}</div>
            ${data.isTyping ? '<div class="status-dot"></div>' : ''}
          </div>
        `;
        if(data.isTyping && name !== currentUser) typers.push(name);
      });

      typingDisp.innerText = typers.length > 0 ? `${typers.join(', ')} is typing...` : '';
    });
  }

  window.sendMessage = () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if(!text) return;

    push(ref(db, 'chatSystem/messages'), {
      user: currentUser,
      text: text,
      time: Date.now()
    });
    
    set(ref(db, `chatSystem/users/${currentUser}/isTyping`), false);
    input.value = '';
  };
</script>
</body>
</html>
