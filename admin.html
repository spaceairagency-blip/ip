
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a; --border: #222222;
    --accent: #25D366; --accent2: #128C7E; --danger: #FF4444; --warning: #FFB800;
    --text: #e8e8e8; --muted: #666; --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif; --display: 'Bebas Neue', cursive;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* SIDEBAR */
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .logo { padding: 28px 20px 24px; border-bottom: 1px solid var(--border); }
  .logo-top { font-family: var(--display); font-size: 28px; letter-spacing: 2px; color: var(--accent); line-height: 1; }
  .logo-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 3px; margin-top: 4px; }
  .nav { flex: 1; padding: 16px 0; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; font-size: 13px; color: var(--muted); border-left: 3px solid transparent; transition: all 0.2s; font-family: var(--mono); letter-spacing: 0.5px; }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(37,211,102,0.05); }
  .nav-badge { margin-left: auto; background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-family: var(--mono); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .status-dot { display: inline-block; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* MAIN */
  .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
  .topbar { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; gap: 16px; position: sticky; top: 0; z-index: 50; }
  .topbar-title { font-family: var(--display); font-size: 22px; letter-spacing: 2px; flex: 1; }
  .topbar-search { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; color: var(--text); font-family: var(--mono); font-size: 12px; width: 220px; outline: none; }
  .btn { padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer; font-family: var(--mono); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  /* CONTENT */
  .content { padding: 32px; flex: 1; }
  .page { display: none; }
  .page.active { display: block; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .stat-card.red::before { background: var(--danger); }
  .stat-card.yellow::before { background: var(--warning); }
  .stat-card.teal::before { background: var(--accent2); }
  .stat-card.green::before { background: var(--accent); }
  .stat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .stat-value { font-family: var(--display); font-size: 42px; line-height: 1; letter-spacing: 1px; }

  /* TABLE & CARDS */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--surface2); }
  td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-family: var(--mono); font-size: 10px; font-weight: 600; }
  .badge-red { background: rgba(255,68,68,0.15); color: var(--danger); }
  .badge-green { background: rgba(37,211,102,0.15); color: var(--accent); }
  .rule-tag { background: rgba(37,211,102,0.08); border: 1px solid rgba(37,211,102,0.2); color: var(--accent); font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 3px; }
  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .rule-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; display: flex; gap: 16px; position: relative; }
  .rule-num { font-family: var(--display); font-size: 36px; color: var(--border); line-height: 1; }

  /* MODALS & TOAST */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .modal-body { padding: 24px 28px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-family: var(--sans); }
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; font-family: var(--mono); font-size: 12px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="logo"><div class="logo-top">ADMIN</div><div class="logo-sub">GROUP CONTROL</div></div>
    <nav class="nav">
      <div class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</div>
      <div class="nav-item" onclick="showPage('violations')">⚠️ Violations <span class="nav-badge" id="viol-badge">0</span></div>
      <div class="nav-item" onclick="showPage('rules')">📋 Rules</div>
      <div class="nav-item" onclick="showPage('members')">👥 Members</div>
    </nav>
    <div class="sidebar-footer"><span class="status-dot"></span>CLOUD CONNECTED</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">DASHBOARD</div>
      <input class="topbar-search" type="text" placeholder="Search..." oninput="handleSearch(this.value)">
      <button class="btn btn-primary" id="topbar-action-btn" onclick="openModal('add-violation')">+ ADD VIOLATION</button>
    </header>

    <div class="content">
      <div class="page active" id="page-dashboard">
        <div class="stats-grid">
          <div class="stat-card red"><div class="stat-label">Total Violations</div><div class="stat-value" id="stat-total">0</div></div>
          <div class="stat-card yellow"><div class="stat-label">Warned</div><div class="stat-value" id="stat-warned">0</div></div>
          <div class="stat-card teal"><div class="stat-label">Removed</div><div class="stat-value" id="stat-removed">0</div></div>
          <div class="stat-card green"><div class="stat-label">Rules Set</div><div class="stat-value" id="stat-rules">0</div></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Member</th><th>Rule Broken</th><th>Date</th><th>Status</th></tr></thead>
            <tbody id="recent-table"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="page-violations">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Member</th><th>Phone</th><th>Rule</th><th>Details</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="violations-table"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="page-rules">
        <div class="rules-grid" id="rules-grid"></div>
      </div>

      <div class="page" id="page-members">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Phone</th><th>Violations</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="members-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-add-violation">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">ADD VIOLATION</div><button onclick="closeModal('add-violation')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Member Name</label><input type="text" id="viol-name"></div>
      <div class="form-group"><label>Phone</label><input type="text" id="viol-phone"></div>
      <div class="form-group"><label>Rule Broken</label><select id="viol-rule"></select></div>
      <div class="form-group"><label>Action</label><select id="viol-status">
          <option value="Warned">Warned</option><option value="Removed">Removed</option><option value="Banned">Banned</option>
      </select></div>
      <div class="form-group"><label>Details</label><textarea id="viol-details"></textarea></div>
      <button class="btn btn-primary" onclick="saveViolation()">SAVE TO CLOUD</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add-rule">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">ADD RULE</div><button onclick="closeModal('add-rule')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Title</label><input type="text" id="rule-title"></div>
      <div class="form-group"><label>Description</label><textarea id="rule-desc"></textarea></div>
      <button class="btn btn-primary" onclick="saveRule()">PUBLISH RULE</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add-member">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">ADD MEMBER</div><button onclick="closeModal('add-member')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Name</label><input type="text" id="mem-name"></div>
      <div class="form-group"><label>Phone</label><input type="text" id="mem-phone"></div>
      <button class="btn btn-primary" onclick="saveMember()">SAVE MEMBER</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDZbD3qG1dKzM9v7A2f7j9E2UZoCEmFKg0",
    authDomain: "groupadmin-62e30.firebaseapp.com",
    databaseURL: "https://groupadmin-62e30-default-rtdb.firebaseio.com",
    projectId: "groupadmin-62e30"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db, 'adminData'), (snapshot) => {
    const data = snapshot.val() || { violations: {}, rules: {}, members: {} };
    const viols = Object.entries(data.violations || {}).map(([id, v]) => ({...v, id}));
    const rules = Object.entries(data.rules || {}).map(([id, r]) => ({...r, id}));
    const members = Object.entries(data.members || {}).map(([id, m]) => ({...m, id}));

    renderAll(viols, rules, members);
  });

  function renderAll(viols, rules, members) {
    // Stats
    document.getElementById('stat-total').innerText = viols.length;
    document.getElementById('stat-warned').innerText = viols.filter(v => v.status === 'Warned').length;
    document.getElementById('stat-removed').innerText = viols.filter(v => v.status !== 'Warned').length;
    document.getElementById('stat-rules').innerText = rules.length;
    document.getElementById('viol-badge').innerText = viols.length;

    // Dashboard & Violations Table
    document.getElementById('recent-table').innerHTML = viols.slice(-5).reverse().map(v => `
      <tr><td>${v.name}</td><td><span class="rule-tag">${v.rule}</span></td><td>Just Now</td><td><span class="badge badge-red">${v.status}</span></td></tr>
    `).join('');

    document.getElementById('violations-table').innerHTML = viols.map(v => `
      <tr><td>${v.name}</td><td>${v.phone}</td><td>${v.rule}</td><td>${v.details}</td><td>${v.status}</td>
      <td><button onclick="window.del('violations/${v.id}')">🗑</button></td></tr>
    `).join('');

    // Rules Grid
    document.getElementById('rules-grid').innerHTML = rules.map((r, i) => `
      <div class="rule-card"><div class="rule-num">${i+1}</div><div><strong>${r.title}</strong><p>${r.desc}</p></div>
      <button style="position:absolute;right:10px;" onclick="window.del('rules/${r.id}')">🗑</button></div>
    `).join('');

    // Members Table
    document.getElementById('members-table').innerHTML = members.map(m => {
        const count = viols.filter(v => v.name === m.name).length;
        return `<tr><td>${m.name}</td><td>${m.phone}</td><td>${count}</td><td>Active</td>
        <td><button onclick="window.del('members/${m.id}')">🗑</button></td></tr>`;
    }).join('');

    // Dropdown
    const sel = document.getElementById('viol-rule');
    sel.innerHTML = rules.map(r => `<option value="${r.title}">${r.title}</option>`).join('') || '<option>General</option>';
  }

  window.saveViolation = () => {
    push(ref(db, 'adminData/violations'), {
      name: document.getElementById('viol-name').value,
      phone: document.getElementById('viol-phone').value,
      rule: document.getElementById('viol-rule').value,
      status: document.getElementById('viol-status').value,
      details: document.getElementById('viol-details').value
    });
    closeModal('add-violation');
  };

  window.saveRule = () => {
    push(ref(db, 'adminData/rules'), {
      title: document.getElementById('rule-title').value,
      desc: document.getElementById('rule-desc').value
    });
    closeModal('add-rule');
  };

  window.saveMember = () => {
    push(ref(db, 'adminData/members'), {
      name: document.getElementById('mem-name').value,
      phone: document.getElementById('mem-phone').value
    });
    closeModal('add-member');
  };

  window.del = (path) => { if(confirm("Delete?")) remove(ref(db, 'adminData/' + path)); };
</script>

<script>
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('topbar-title').innerText = id.toUpperCase();
    
    const btn = document.getElementById('topbar-action-btn');
    if(id === 'rules') { btn.innerText = "+ ADD RULE"; btn.onclick = () => openModal('add-rule'); }
    else if(id === 'members') { btn.innerText = "+ ADD MEMBER"; btn.onclick = () => openModal('add-member'); }
    else { btn.innerText = "+ ADD VIOLATION"; btn.onclick = () => openModal('add-violation'); }
  }
  function openModal(id) { document.getElementById('modal-' + id).classList.add('open'); }
  function closeModal(id) { document.getElementById('modal-' + id).classList.remove('open'); }
</script>
</body>
</html>
